<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PetService</title>

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ========================================= -->
    <!-- NAVBAR -->
    <!-- ========================================= -->

    <nav class="topbar">
        <div class="topbar-inner">

            <a class="topbar-brand" href="index.html">
                🐾
                <span class="brand-name">
                    Pet<span>Service</span>
                </span>
            </a>

            <div class="topbar-nav">
                <a class="nav-link" href="index.html">Início</a>
                <a class="nav-link active" href="login.html">Login</a>
                <a class="nav-link" href="cadastro.html">Cadastro</a>
            </div>

        </div>
    </nav>

    <!-- ========================================= -->
    <!-- HERO -->
    <!-- ========================================= -->

    <section class="page-hero">

        <h1>Acesse sua conta</h1>

        <p>
            Entre para gerenciar seus pets,
            acompanhar seus agendamentos e utilizar nossos serviços.
        </p>

    </section>

    <!-- ========================================= -->
    <!-- FORMULÁRIO -->
    <!-- ========================================= -->

    <main class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-5 col-md-7">

                <section class="card shadow-sm border-0">

                    <div class="card-body p-4">

                        <div class="text-center mb-4">

                            <i class="bi bi-person-circle display-4 text-success"></i>

                            <h2 class="mt-3">
                                Entrar
                            </h2>

                            <p class="text-muted">
                                Informe seus dados de acesso.
                            </p>

                        </div>

                        <form id="form-login">

                            <div class="mb-3">

                                <label for="login-email" class="form-label">
                                    E-mail
                                </label>

                                <input type="email" id="login-email" class="form-control form-control-lg"
                                    placeholder="seu@email.com" required>

                            </div>

                            <div class="mb-3">

                                <label for="login-senha" class="form-label">
                                    Senha
                                </label>

                                <input type="password" id="login-senha" class="form-control form-control-lg"
                                    placeholder="Digite sua senha" required>

                            </div>

                            <button type="submit" class="btn btn-success btn-lg w-100">

                                <i class="bi bi-box-arrow-in-right me-2"></i>
                                Entrar

                            </button>

                        </form>

                        <hr class="my-4">

                        <div class="text-center">

                            <p class="mb-2">
                                Ainda não possui cadastro?
                            </p>

                            <a href="cadastro.html" class="btn btn-outline-success">

                                <i class="bi bi-person-plus me-2"></i>
                                Criar Conta

                            </a>

                        </div>

                        <div id="resultado" class="mt-4"></div>

                    </div>

                </section>

            </div>

        </div>

    </main>

    <!-- ========================================= -->
    <!-- FOOTER -->
    <!-- ========================================= -->

    <footer class="text-center py-4">

        <p class="mb-0">
            🐾 PetService • Sistema de Agendamento para Pet Shop
        </p>

    </footer>

    <!-- ========================================= -->
    <!-- SCRIPTS -->
    <!-- ========================================= -->

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="js/api.js"></script>

    <script src="js/login.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
