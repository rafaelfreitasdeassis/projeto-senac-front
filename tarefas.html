<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="topbar">
        <div class="topbar-inner">
            <a class="topbar-brand" href="index.html">
                <span class="brand-name">Task<span>Flow</span></span>
            </a>
            <div class="topbar-nav">
                <a class="nav-link" href="index.html">Início</a>
                <a class="nav-link active" href="tarefas.html">Tarefas</a>
                <a class="nav-link" href="perfil.html">Perfil</a>
            </div>
            <div class="topbar-actions">
                <button id="topbar-logout" class="secondary small is-hidden" type="button">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container app-page">
        <section class="card app-card">
            <div class="card-header app-header">
                <div>
                    <h2 class="app-subtitle">Gestão de tarefas</h2>
                    <p class="app-muted">Use visualização solta, kanban ou tabela.</p>
                </div>
                <button id="btn-nova-tarefa" type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#tarefaModal">Nova tarefa</button>
            </div>

            <div class="view-switch-simple" role="tablist" aria-label="Modo de visualização">
                <button id="view-cards" class="small active" type="button">Cards (solto)</button>
                <button id="view-kanban" class="small" type="button">Kanban</button>
                <button id="view-table" class="small" type="button">Tabela</button>
            </div>

            <div id="resultado"></div>
        </section>

        <section id="tarefas-cards-wrapper">
            <div id="lista-tarefas-cards" class="tarefas-grid"></div>
        </section>

        <section id="tarefas-kanban-wrapper" class="is-hidden">
            <div class="kanban-board">
                <div class="kanban-column" data-status="novo">
                    <h3>Novo</h3>
                    <div id="kanban-novo" class="kanban-list"></div>
                </div>
                <div class="kanban-column" data-status="andamento">
                    <h3>Em andamento</h3>
                    <div id="kanban-andamento" class="kanban-list"></div>
                </div>
                <div class="kanban-column" data-status="concluida">
                    <h3>Concluída</h3>
                    <div id="kanban-concluida" class="kanban-list"></div>
                </div>
            </div>
        </section>

        <section id="tarefas-tabela-wrapper" class="table-wrapper is-hidden">
            <table>
                <thead>
                    <tr>
                        <th>#ID</th>
                        <th>Título</th>
                        <th>Descrição</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-tarefas-tabela"></tbody>
            </table>
        </section>
    </div>

    <footer>TaskFlow · Node.js + Express + SQLite</footer>

    <div class="modal fade" id="tarefaModal" tabindex="-1" aria-labelledby="tarefaModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form id="form-tarefa" class="task-form-modal">
                    <div class="modal-header">
                        <h5 class="modal-title" id="tarefaModalTitle">Nova tarefa</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="tarefa-id">
                        <div class="form-field">
                            <label for="tarefa-titulo">Título</label>
                            <input type="text" id="tarefa-titulo" placeholder="Ex: Revisar layout" required>
                        </div>
                        <div class="form-field">
                            <label for="tarefa-descricao">Descrição</label>
                            <textarea id="tarefa-descricao" rows="3" placeholder="Detalhes da tarefa"></textarea>
                        </div>
                        <div class="form-field status-field">
                            <label for="tarefa-status">Status</label>
                            <select id="tarefa-status">
                                <option value="novo">Novo</option>
                                <option value="andamento">Em andamento</option>
                                <option value="concluida">Concluída</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button id="btn-modal-excluir" type="button" class="btn btn-outline-danger is-hidden">Excluir</button>
                        <button id="btn-modal-editar" type="button" class="btn btn-outline-primary is-hidden">Editar</button>
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button id="btn-modal-salvar" type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api.js"></script>
    <script src="js/tarefas.js"></script>
</body>
</html>
