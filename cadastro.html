<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>


    <!-- ── ESTILOS ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

  
    <!-- ── NAVBAR ── -->
    <nav class="topbar">
        <div class="topbar-inner">
            <a class="topbar-brand" href="index.html">
                <span class="brand-name">Task<span>Flow</span></span>
            </a>
            <div class="topbar-nav">
                <a class="nav-link " href="index.html">Início</a>
                <a class="nav-link " href="login.html">Login</a>
                <a class="nav-link active" href="cadastro.html">Cadastro</a>
            </div>
            <div class="topbar-actions">
                <button id="topbar-logout" class="secondary small is-hidden" type="button">Sair</button>
            </div>
        </div>
    </nav>

    <!-- ── CONTEÚDO ── -->
    <div class="container center py-4">

        <section class="card info-card shadow-sm border-0">
            <p>Preencha os dados abaixo e clique em <strong>Criar conta</strong>. Depois, vá para o Login para autenticar.</p>
        </section>

        <section class="card shadow-sm">
            <div class="card-header">
                <div>
                    <h2>Criar conta</h2>
                    <p>Registre-se para começar a usar o TaskFlow.</p>
                </div>
            </div>

            <form id="form-cadastro">
                <div class="form-field">
                    <label for="cadastro-nome">Nome completo</label>
                    <input class="form-control form-control-lg" type="text" id="cadastro-nome" placeholder="Seu nome" required>
                </div>
                <div class="form-field">
                    <label for="cadastro-email">E-mail</label>
                    <input class="form-control form-control-lg" type="email" id="cadastro-email" placeholder="seu@email.com" required>
                </div>
                <div class="form-field">
                    <label for="cadastro-telefone">Telefone</label>
                    <input class="form-control form-control-lg" type="tel" id="cadastro-telefone" placeholder="(11) 91234-5678" required>
                </div>
                <div class="form-field">
                    <label for="cadastro-senha">Senha</label>
                    <input class="form-control form-control-lg" type="password" id="cadastro-senha" placeholder="Mínimo 6 caracteres" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100"><i class="bi bi-person-plus me-2"></i>Criar conta</button>
            </form>

            <div id="resultado"></div>
        </section>

    </div>

    <footer>TaskFlow · Node.js + Express + SQLite</footer>


    <!-- ── SCRIPTS ── -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api.js"></script>
    <script src="js/cadastro.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
